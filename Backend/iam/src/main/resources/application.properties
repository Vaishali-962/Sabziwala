spring.application.name=iam

# Time conversion 15 × 60 × 1000 / 24 × 60 × 60 × 1000
jwt.secret=${JWT_SECRET:c2FienVpd2FsYS1oeXBlcmxvY2FsLXZlZ2V0YWJsZS1mcnVpdC1kZWxpdmVyeS1wdW5lLWluZGlhLXNlY3JldC1rZXktMjAyNA==}
jwt.access-token.expiration-ms=900000
jwt.refresh-token.expiration-ms=86400000

# ── Datasource ──
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sabziwala}
spring.datasource.username=${DB_USER:admin}
spring.datasource.password=${DB_PASS:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.pool-name=IAM-HikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000


# ── JPA / Hibernate ──
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=iam

spring.jpa.open-in-view=false


# ── Redis Configuration ──
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASS:}
spring.data.redis.timeout=5000ms

spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
